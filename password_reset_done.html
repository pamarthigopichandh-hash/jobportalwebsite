<!DOCTYPE html>
{% extends 'jobapp/base.html' %}

{% block body_block %}

<div class="container min-vh-100 d-flex justify-content-center align-items-start pt-5">
    <div class="row w-100 justify-content-center">
        <div class="col-md-4">

            <div class="card shadow-lg border-0 rounded-4 text-center">

                <!-- Header -->
                <div class="card-header text-white rounded-top-4"
                     style="background: linear-gradient(135deg, #198754, #20c997);">
                    <h4 class="fw-bold mb-0">Email Sent</h4>
                </div>

                <!-- Body -->
                <div class="card-body p-4">

                    <!-- Icon -->
                    <div class="mb-3">
                        <i class="bi bi-envelope-check-fill text-success fs-1"></i>
                    </div>

                    <p class="text-muted">
                        We’ve emailed you instructions for setting your password.
                        If an account exists with the email you entered,
                        you should receive it shortly.
                    </p>

                    <p class="small text-muted">
                        Please check your inbox and spam folder.
                    </p>

                    <!-- Action -->
                    <div class="d-grid mt-3">
                        <a href="/accounts/login" class="btn btn-success btn-lg rounded-3">
                            Back to Login
                        </a>
                    </div>

                </div>

            </div>

        </div>
    </div>
</div>

{% endblock %}
