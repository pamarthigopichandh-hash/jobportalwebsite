<!DOCTYPE html>
{% extends 'jobapp/base.html' %}

{% block body_block %}

<div class="container min-vh-100 d-flex justify-content-center align-items-start pt-5">
    <div class="row w-100 justify-content-center">
        <div class="col-md-4">

            <div class="card shadow-lg border-0 rounded-4 text-center">

                <!-- Header -->
                <div class="card-header text-white rounded-top-4"
                     style="background: linear-gradient(135deg, #198754, #20c997);">
                    <h4 class="fw-bold mb-0">Success</h4>
                </div>

                <!-- Body -->
                <div class="card-body p-4">

                    <!-- Success Icon -->
                    <div class="mb-3">
                        <i class="bi bi-check-circle-fill text-success fs-1"></i>
                    </div>

                    <h5 class="fw-bold">Password Reset Successful</h5>

                    <p class="text-muted">
                        Your password has been updated successfully.
                        You can now log in using your new password.
                    </p>

                    <!-- Action -->
                    <div class="d-grid mt-3">
                        <a href="{% url 'login' %}"
                           class="btn btn-success btn-lg rounded-3">
                            Go to Login
                        </a>
                    </div>

                </div>

            </div>

        </div>
    </div>
</div>

{% endblock %}
