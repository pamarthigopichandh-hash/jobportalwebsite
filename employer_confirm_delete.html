<!DOCTYPE html>
{% extends 'jobapp/base.html' %}
{% load widget_tweaks %}

{% block body_block %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-danger text-white text-center py-3">
                    <h3 class="mb-0">Delete Job</h3>
                </div>
                <div class="card-body p-4 text-center">
                    <p class="fs-5">
                        Are you sure you want to delete <strong>{{ job.title }}</strong>?
                    </p>

                    <form method="POST" class="d-flex justify-content-center gap-3 mt-4">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-lg fw-bold">
                            Yes, Delete
                        </button>
                        <a href="{% url 'employer_dashboard' %}" class="btn btn-secondary btn-lg fw-bold">
                            Cancel
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
